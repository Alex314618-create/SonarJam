<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>SonarJam HUD — 十字准星 / 能量圆 / 警告</title>
<style>
  /* === 全局：模拟游戏黑背景 === */
  body {
    margin: 0;
    height: 100vh;
    background: #050608;
    color: #c8e8f0;
    font-family: "DM Mono", "Consolas", monospace;
    overflow: hidden;
  }

  /* === 视窗（按 1920×1080 设计基准） === */
  .viewport {
    position: relative;
    width: 1920px;
    height: 1080px;
    margin: 0 auto;
    background: radial-gradient(circle at center, #0a0c10 0%, #050608 80%);
  }

  /* ============================================================
     ELEMENT: crosshair
     anchor: center
     data: 静态（无绑定）
     设计基准：以 128px 准星源框为 1x 设计尺寸，可按 2x 超采样导出
     ============================================================ */
  .crosshair-cluster {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 128px;
    height: 128px;
    transform: translate(-50%, -50%);
  }
  .crosshair {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1.2px;
    height: 1.2px;
    transform: translate(-50%, -50%);
    background: rgba(150, 186, 198, 0.78);
    box-shadow: 0 0 2px rgba(118, 152, 164, 0.32);
  }
  /* 十字准星的四条小臂 */
  .crosshair::before, .crosshair::after {
    content: "";
    position: absolute;
    background: rgba(150, 186, 198, 0.78);
  }
  .crosshair::before {  /* 水平 */
    left: -4.2px;
    top: 0;
    width: 9.6px;
    height: 1.2px;
  }
  .crosshair::after {  /* 垂直 */
    left: 0;
    top: -4.2px;
    width: 1.2px;
    height: 9.6px;
  }

  /* ============================================================
     ELEMENT: energy_ring
     anchor: center
     data: energy_ratio (0..1)
     表现：十字准星周围一个正五边形的 5 个角点
     实心灰蓝 = 有能量，空心细灰边 = 没能量
     每消耗 1 格，熄灭 1 个点；不做连续填充
     ============================================================ */
  .energy-ring {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 0; height: 0;  /* 中心点；圆通过子元素的绝对偏移摆 */
  }
  .energy-ring .cell {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1px solid rgba(128, 136, 146, 0.72);
    transform: translate(-50%, -50%);
    transition: background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
  }
  /* 正五边形 5 个角点，半径约 26px，收在 128px 源框中心 */
  .energy-ring .cell.p1 { top: -26px; left: 0; }
  .energy-ring .cell.p2 { top: -8px; left: 25px; }
  .energy-ring .cell.p3 { top: 21px; left: 15px; }
  .energy-ring .cell.p4 { top: 21px; left: -15px; }
  .energy-ring .cell.p5 { top: -8px; left: -25px; }
  /* 实心 / 空心状态 */
  .cell.full {
    background: rgba(108, 156, 176, 0.78);
    border-color: rgba(148, 160, 170, 0.85);
    box-shadow: 0 0 4px rgba(90, 132, 150, 0.22);
  }
  .cell.empty {
    background: transparent;
    border-color: rgba(104, 112, 122, 0.58);
    box-shadow: none;
  }

  /* ============================================================
     ELEMENT: warning_banner
     anchor: top-center  offset (0, 60)
     data: 来自 warnings 队列；新警告从 0 透明度淡入到 1，停留 4s 后淡出
     ============================================================ */
  .warning-banner {
    position: absolute;
    left: 50%;
    top: 60px;
    transform: translateX(-50%);
    padding: 8px 18px;
    background: rgba(20, 8, 6, 0.7);
    border: 1px solid rgba(220, 60, 50, 0.6);
    border-radius: 2px;
    color: rgba(255, 180, 175, 0.95);
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    box-shadow: 0 0 12px rgba(220, 60, 50, 0.35);
    animation: warning-pulse 1.8s ease-in-out infinite;
  }
  @keyframes warning-pulse {
    0%, 100% { opacity: 0.95; }
    50%      { opacity: 0.6;  }
  }

  /* ============================================================
     ELEMENT: status_log (小字，左下角，叠加多条)
     anchor: bottom-left offset (24, -24)
     data: 来自 system_log 队列，新条目顶部 push，旧的褪色淡出
     ============================================================ */
  .status-log {
    position: absolute;
    left: 24px;
    bottom: 24px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(140, 200, 220, 0.6);
    line-height: 1.5;
  }
  .status-log .line   { opacity: 1.0; }
  .status-log .line.dim { opacity: 0.4; }
  .status-log .line.faded { opacity: 0.15; }

  /* 标签 */
  .label { position: absolute; font-size: 10px; color: rgba(120,160,180,0.4); }
</style>
</head>
<body>
  <div class="viewport">

    <!-- ============================================================
         十字准星
         ============================================================ -->
    <div class="crosshair-cluster">
      <div class="crosshair"></div>

      <!-- ============================================================
           能量点：5 个，对应 5 段离散能量。
           运行时按剩余格数决定哪几个是 .full / .empty。
           建议：按顺时针顺序熄灭，不做连续过渡。
           ratio=1.0 或 5/5 → 全 full
           ratio=0.8 或 4/5 → 最后 1 个点 empty
           ============================================================ -->
      <div class="energy-ring">
        <div class="cell p1 full"></div>
        <div class="cell p2 full"></div>
        <div class="cell p3 full"></div>
        <div class="cell p4 full"></div>
        <div class="cell p5 full"></div>
      </div>
    </div>

    <!-- ============================================================
         警告横幅（顶部中央）
         data: warnings 队列
         ============================================================ -->
    <div class="warning-banner">外部供电断裂 · 切换至内部电池</div>

    <!-- ============================================================
         状态日志（左下，多行叠加）
         data: system_log 队列；新的在上、旧的褪色
         ============================================================ -->
    <div class="status-log">
      <div class="line">&gt; SONAR v0.7 · 感知协议已加载</div>
      <div class="line dim">&gt; 光学通道：屏蔽</div>
      <div class="line dim">&gt; 声学通道：开放</div>
      <div class="line faded">&gt; 威胁标记引擎：激活</div>
    </div>

  </div>
</body>
</html>
